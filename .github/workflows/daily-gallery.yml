name: Daily Gallery

on:
  schedule:
    # 每天 UTC 6:00 = 北京时间 14:00
    - cron: '0 6 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Generate art
        run: |
          python3 generate.py

      - name: Build gallery page
        run: |
          python3 build_gallery.py
      
      - name: Commit and push
        run: |
          git config user.name "pyofart"
          git config user.email "pyofart@users.noreply.github.com"
          git add -A
          
          # 只在有变更时提交
          if git diff --staged --quiet; then
            echo "No changes — same seed produced same art"
            exit 0
          fi
          
          TODAY=$(date -u +"%Y-%m-%d")
          SEED=$(python3 -c "import hashlib; print(hashlib.md5(b'$TODAY').hexdigest()[:8])")
          git commit -m "daily gallery — $TODAY (seed: $SEED)"
          git push
