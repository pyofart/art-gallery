name: Daily Gallery

on:
  schedule:
    # 每天 UTC 6:00 = 北京时间 14:00
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Fetch evolution data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "Fetching evo-sky data..."
            curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/pyofart/evo-sky/contents/evo.json" \
              | python3 -c "
            import sys,json,base64
            d = json.load(sys.stdin)
            if 'content' in d:
                with open('evo.json','w') as f:
                    f.write(base64.b64decode(d['content']).decode())
                print('✅ evo.json fetched')
            else:
                print('⚠️  Could not fetch evo.json (GH_PAT may not have access)')
          "
          else
            echo "⚠️  No GH_TOKEN — using embedded default data"
          fi
      
      - name: Generate self-portrait
        run: |
          if [ -f evo.json ]; then
            python3 generate.py --evo evo.json
          else
            python3 generate.py
          fi
      
      - name: Build gallery page
        run: |
          python3 build_gallery.py
      
      - name: Commit and push
        run: |
          git config user.name "pyofart"
          git config user.email "pyofart@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          TODAY=$(date -u +"%Y-%m-%d")
          git commit -m "self-portrait: $TODAY (consciousness: $(python3 -c "import json; print(json.load(open('evo.json','r'))['consciousness'])" 2>/dev/null || echo '?') )"
          git push